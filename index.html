<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуальный Таск-Менеджер (ФИНАЛ)</title>

    <!-- Библиотеки -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- ЦВЕТОВЫЕ ТЕМЫ --- */
        :root { --bg-color: #f4f7f6; --surface-color: #ffffff; --text-main: #2c3e50; --text-desc: #34495e; --border-color: #ddd; --input-bg: #ffffff; }
        [data-theme="dark"] { --bg-color: #1a1a1a; --surface-color: #2d2d2d; --text-main: #f8f9fa; --text-desc: #ced4da; --border-color: #495057; --input-bg: #333333; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background-color: var(--bg-color); transition: background-color 0.3s; }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #toolbar { position: absolute; top: 15px; left: 15px; right: 15px; background: var(--surface-color); padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 100; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
        #toolbar button, #theme-select { padding: 8px 12px; font-size: 14px; cursor: pointer; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-main); font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        #toolbar button:hover { opacity: 0.8; transform: translateY(-1px); }
        .vis-manipulation { display: none !important; }

        /* ХОЛСТ ГРАФА */
        #network-container { width: 100%; height: 100vh; outline: none; }

        /* НИЖНЯЯ ПАНЕЛЬ ОПИСАНИЯ */
        #description-panel { position: absolute; bottom: -250px; left: 0; width: 100%; height: auto; min-height: 160px; padding: 20px; box-sizing: border-box; background: var(--surface-color); border-top: 3px solid var(--border-color); box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 150; transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; justify-content: space-between; align-items: flex-start; }
        #description-panel.active { bottom: 0; }
        .desc-content { max-width: 75%; }
        h3 { margin-top: 0; color: var(--text-main); font-size: 22px; margin-bottom: 5px; }
        .due-date-badge { display: inline-block; background: #ffe4e6; color: #e11d48; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; margin-bottom: 10px; }
        #desc-text { color: var(--text-desc); font-size: 16px; margin: 0; white-space: pre-wrap; }
        #btn-complete { padding: 12px 24px; font-size: 16px; font-weight: bold; color: white; background: #22c55e; border: none; border-radius: 8px; cursor: pointer; }

        /* МОДАЛЬНЫЕ ОКНА (ВСПЛЫВАЮЩИЕ) */
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surface-color); padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 200; width: 340px; color: var(--text-main); }
        .modal h4 { margin: 0 0 15px 0; font-size: 16px; text-align: center; }
        
        /* СМАЙЛИКИ И ЦВЕТА */
        .color-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
        .color-dot.selected { border: 2px solid var(--text-main); transform: scale(1.15); }
        .category-title { font-size: 12px; color: #888; margin-top: 10px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; text-align: left; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; font-size: 28px; text-align: center; }
        .emoji-grid span { cursor: pointer; transition: transform 0.1s; user-select: none; }
        .emoji-grid span:hover { transform: scale(1.3); }

        /* ИНПУТЫ И ФОРМЫ */
        .custom-input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 14px; background: var(--input-bg); color: var(--text-main); }
        .custom-textarea { height: 80px; resize: none; }
        .input-label { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 4px; display: block; text-transform: uppercase; }
        
        .btn-row { display: flex; gap: 10px; }
        .btn-save { flex: 1; background: #118ab2; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .cancel-btn { flex: 1; background: #ffe4e6 !important; color: #e11d48 !important; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .edge-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        
        /* КНОПКА МАСШТАБА (ПРИЦЕЛ) */
        #btn-fit { position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--surface-color); color: var(--text-main); border: 2px solid var(--border-color); font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 90; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        #btn-fit:hover { transform: scale(1.1); }

        /* АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНА (Панель внизу) */
        @media (max-width: 768px) { 
            #toolbar { top: auto; bottom: 20px; left: 10px; right: 10px; box-shadow: 0 -4px 15px rgba(0,0,0,0.15); padding: 8px; } 
            .modal { width: 85%; padding: 20px; } 
            #description-panel { padding-bottom: 120px; height: auto; min-height: 180px; } 
            #btn-fit { bottom: 100px; } 
        }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ (ИЛИ НИЖНЯЯ НА МОБИЛКЕ) ПАНЕЛЬ ИНСТРУМЕНТОВ -->
    <div id="toolbar">
        <button onclick="addNodeMode()">➕ Добавить</button>
        <button onclick="addEdgeMode()">🔗 Соединить</button>
        <button onclick="deleteSelected()" style="color: #e11d48;">🗑 Удалить</button>
        
        <!-- ВОЗВРАЩЕННАЯ КНОПКА ОТМЕНЫ (Скрыта по умолчанию) -->
        <button id="btn-undo" onclick="undoDelete()" style="display: none; background: #fef3c7; color: #d97706; border-color: #fbbf24;">↩️ Отменить</button>
        
        <button onclick="clearAllData()" style="background: #fff1f2; color: #e11d48; border-color: #fecdd3;">⚠️ Очистить поле</button>
        
        <div style="width: 2px; height: 20px; background: var(--border-color); margin: 0 5px;"></div>
        
        <!-- КНОПКИ РЕЗЕРВНОГО КОПИРОВАНИЯ (На ПК) -->
        <button onclick="exportData()" title="Скачать копию на ПК">💾 Бэкап</button>
        <button onclick="document.getElementById('file-import').click()">📂 Загрузить</button>
        <input type="file" id="file-import" style="display: none" accept=".json" onchange="importData(event)">

        <select id="theme-select" onchange="applyTheme(this.value)">
            <option value="light">☀️ Светлая</option><option value="dark">🌙 Тёмная</option><option value="system">💻 Авто</option>
        </select>
    </div>

    <!-- КНОПКА ПРИЦЕЛА -->
    <button id="btn-fit" onclick="fitCamera()" title="Показать весь граф">🎯</button>

    <!-- МОДАЛКА 1: ВЫБОР СМАЙЛА И ЦВЕТА -->
    <div id="emoji-picker" class="modal">
        <h4>1. Выбери цвет:</h4>
        <div class="color-row" id="color-selector">
            <div class="color-dot selected" style="background:#118ab2" onclick="pickColor(this, '#118ab2')"></div>
            <div class="color-dot" style="background:#06d6a0" onclick="pickColor(this, '#06d6a0')"></div>
            <div class="color-dot" style="background:#ffd166" onclick="pickColor(this, '#ffd166')"></div>
            <div class="color-dot" style="background:#ef476f" onclick="pickColor(this, '#ef476f')"></div>
            <div class="color-dot" style="background:#8338ec" onclick="pickColor(this, '#8338ec')"></div>
        </div>
        
        <h4>2. Выбери иконку:</h4>
        <div class="category-title">💼 Работа и Учёба</div>
        <div class="emoji-grid">
            <span onclick="selectEmoji('💼')">💼</span><span onclick="selectEmoji('💻')">💻</span><span onclick="selectEmoji('📞')">📞</span>
            <span onclick="selectEmoji('📚')">📚</span><span onclick="selectEmoji('📊')">📊</span><span onclick="selectEmoji('🎓')">🎓</span>
        </div>
        <div class="category-title">🏃‍♂️ Здоровье и Спорт</div>
        <div class="emoji-grid">
            <span onclick="selectEmoji('🏋️‍♂️')">🏋️‍♂️</span><span onclick="selectEmoji('🏃‍♂️')">🏃‍♂️</span><span onclick="selectEmoji('🧘‍♂️')">🧘‍♂️</span>
            <span onclick="selectEmoji('🍏')">🍏</span><span onclick="selectEmoji('💊')">💊</span><span onclick="selectEmoji('⚽')">⚽</span>
        </div>
        <div class="category-title">🏠 Быт и Личное</div>
        <div class="emoji-grid">
            <span onclick="selectEmoji('🛒')">🛒</span><span onclick="selectEmoji('🧹')">🧹</span><span onclick="selectEmoji('🍔')">🍔</span>
            <span onclick="selectEmoji('💰')">💰</span><span onclick="selectEmoji('✈️')">✈️</span><span onclick="selectEmoji('💡')">💡</span>
        </div>
        <div class="btn-row" style="margin-top: 15px;"><button class="cancel-btn" onclick="cancelAction()">Отмена</button></div>
    </div>

    <!-- МОДАЛКА 2: ВВОД ДАННЫХ (ОБЯЗАТЕЛЬНЫЕ ПОЛЯ) -->
    <div id="text-input-modal" class="modal">
        <h4 id="text-modal-title">Настройка задачи</h4>
        <span class="input-label">Обязательно: Название</span>
        <input type="text" id="custom-title" class="custom-input" placeholder="Например: Позвонить клиенту">
        
        <span class="input-label">Обязательно: Срок (Дедлайн)</span>
        <input type="date" id="custom-date" class="custom-input">
        
        <span class="input-label">Обязательно: Описание</span>
        <textarea id="custom-desc" class="custom-input custom-textarea" placeholder="Подробное описание задачи..."></textarea>
        
        <div class="btn-row"><button class="btn-save" onclick="saveCustomText()">✔ Создать</button><button class="cancel-btn" onclick="cancelAction()">Отмена</button></div>
    </div>

    <!-- МОДАЛКА 3: ТИП СВЯЗИ -->
    <div id="edge-type-modal" class="modal" style="width: 280px;">
        <h4>Выберите тип связи:</h4>
        <button class="edge-btn" style="background: #9ca3af;" onclick="saveEdge('normal')">➖ Обычная задача</button>
        <button class="edge-btn" style="background: #ef476f;" onclick="saveEdge('urgent')">🚨 СРОЧНО! (Дедлайн)</button>
        <button class="edge-btn" style="background: #118ab2; border: 2px dashed #fff;" onclick="saveEdge('idea')">💡 Идея (на будущее)</button>
        <button class="cancel-btn" onclick="cancelAction()">Отмена</button>
    </div>

    <!-- ХОЛСТ -->
    <div id="network-container"></div>

    <!-- ПАНЕЛЬ ЧТЕНИЯ -->
    <div id="description-panel">
        <div class="desc-content">
            <h3 id="desc-title">Название</h3>
            <div id="desc-date" class="due-date-badge" style="display:none;"></div>
            <p id="desc-text">Описание</p>
        </div>
        <button id="btn-complete" onclick="markCompleted()">✔ Выполнено</button>
    </div>

    <script type="text/javascript">
var network, nodes, edges;
        var tempNodeData = null, tempCallback = null, tempEdgeData = null, tempEdgeCallback = null;
        var selectedColor = '#118ab2', currentSelectedNodeId = null;
        
        // КОРЗИНА ДЛЯ ОТМЕНЫ УДАЛЕНИЯ
        var trash =[]; 

        // ЗАЩИТА ОТ XSS (Очищаем введенные данные от вредоносных символов)
        function escapeHTML(str) { 
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); 
        }

        function applyTheme(theme) {
            localStorage.setItem('taskManagerApp_Theme', theme);
            document.body.setAttribute('data-theme', theme === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : theme);
        }

        // 🟢 ИДЕАЛЬНАЯ ОПТИМИЗАЦИЯ ПАМЯТИ (DEBOUNCE)
        // Браузер больше не будет виснуть! Мы сохраняем данные только когда ты закончил действие,
        // а не 60 раз в секунду во время перетаскивания.
        var saveTimeout = null;
        window.saveData = function() {
            if (!network) return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(function() {
                var positions = network.getPositions();
                var nodesArray = nodes.get().map(function(n) {
                    var c = Object.assign({}, n);
                    if (positions[c.id]) { c.x = positions[c.id].x; c.y = positions[c.id].y; }
                    return c;
                });
                // Пишем в память браузера тихо и без тормозов
                localStorage.setItem('taskManagerApp_Data', JSON.stringify({ nodes: nodesArray, edges: edges.get() }));
            }, 1000); 
        };

        window.clearAllData = function() {
            if (confirm("ВНИМАНИЕ: Это полностью очистит всё поле. Вы уверены?")) {
                localStorage.removeItem('taskManagerApp_Data');
                location.reload();
            }
        };

        // 🎭 УМНЫЕ ЭМОЦИИ ДЛЯ "Я"
        window.updateAllLabelsAndEmotions = function() {
            var updates =[];
            var allTasks = nodes.get().filter(n => n.id !== 1);
            var activeNormal = 0, activeUrgent = 0;
            var allEdges = edges.get();

            allTasks.forEach(task => {
                if (!task.isCompleted) {
                    let edge = allEdges.find(e => e.to === task.id || e.from === task.id);
                    if (edge && edge.type === 'urgent') activeUrgent++; else activeNormal++;
                }
            });

            var emotion = '🧍‍♂️';
            if (allTasks.length > 0 && allTasks.every(t => t.isCompleted)) emotion = '😎'; // Всё выполнено
            else if (activeUrgent >= 5) emotion = '😱'; // >= 5 дедлайнов (Ужас)
            else if (activeNormal >= 10) emotion = '😰'; // >= 10 задач (Потерянный)
            else if (activeUrgent > 0) emotion = '😟'; // Есть дедлайны (Напряжен)
            else if (activeNormal >= 5) emotion = '🤔'; // >= 5 задач (Задумчив)
            else emotion = '😐'; // Обычное состояние

            updates.push({ id: 1, label: emotion + '\nЯ' });

            // Обновляем текст задач (без полосок и коробок)
            nodes.forEach(node => {
                if(node.id === 1) return;
                let text = (node.isCompleted ? '✅ ' : '') + (node.rawEmoji || '') + '\n' + (node.rawTitle || 'Задача');
                if (node.label !== text) updates.push({ id: node.id, label: text });
            });
            nodes.update(updates);
        };

        window.onload = function() {
            var savedTheme = localStorage.getItem('taskManagerApp_Theme') || 'light';
            document.getElementById('theme-select').value = savedTheme; applyTheme(savedTheme);

            // АВТОМАТИЧЕСКАЯ ЗАГРУЗКА ДАННЫХ
            var savedData = localStorage.getItem('taskManagerApp_Data');
            var initialNodes = savedData ? JSON.parse(savedData).nodes :[];
            var initialEdges = savedData ? JSON.parse(savedData).edges :[];
            
            // Защита: гарантируем, что Я (id 1) есть всегда и зафиксирован
            if(initialNodes.length === 0) initialNodes.push({ id: 1, rawEmoji: '', rawTitle: 'Я', label: '🧍‍♂️\nЯ', font: { size: 40, color: '#333' }, shape: 'circle', color: '#ffd166', fixed: true });
            initialNodes.forEach(n => { if(n.id === 1) n.fixed = true; });

            nodes = new vis.DataSet(initialNodes);
            edges = new vis.DataSet(initialEdges);
            
            var options = {
                physics: { enabled: true, solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -100, springLength: 150 } },
                interaction: { hover: true, dragNodes: true },
                manipulation: { enabled: false,
                    addNode: function(d, cb) { tempNodeData=d; tempCallback=cb; document.getElementById('emoji-picker').style.display='block'; },
                    addEdge: function(d, cb) { if(d.from!==d.to){ tempEdgeData=d; tempEdgeCallback=cb; document.getElementById('edge-type-modal').style.display='block'; } else cb(null); }
                }
            };

            network = new vis.Network(document.getElementById('network-container'), { nodes: nodes, edges: edges }, options);
            
            network.on("stabilizationIterationsDone", function () { network.setOptions({ physics: { enabled: false } }); });
            network.on("dragStart", function(p) { if(p.nodes.length > 0 && p.nodes[0] !== 1) network.setOptions({ physics: { enabled: true } }); });
            network.on("dragEnd", function() { setTimeout(() => network.setOptions({ physics: { enabled: false } }), 1000); saveData(); });

            network.once("afterDrawing", () => fitCamera());
            updateAllLabelsAndEmotions();

            nodes.on('*', () => { updateAllLabelsAndEmotions(); saveData(); }); 
            edges.on('*', () => { updateAllLabelsAndEmotions(); saveData(); });

            network.on('selectNode', function (p) {
                var node = nodes.get(p.nodes[0]);
                currentSelectedNodeId = node.id;
                
                document.getElementById('desc-title').innerText = (node.rawEmoji ? node.rawEmoji + ' ' : '') + node.rawTitle;
                
                var dateEl = document.getElementById('desc-date');
                if (node.dueDate) { dateEl.innerText = "🗓 Срок: " + node.dueDate; dateEl.style.display = 'inline-block'; } 
                else { dateEl.style.display = 'none'; }

                document.getElementById('desc-text').innerText = node.description || "Описания нет.";
                document.getElementById('description-panel').classList.add('active');
                document.getElementById('btn-complete').style.display = (node.id === 1 || node.isCompleted) ? 'none' : 'block';
            });

            network.on('deselectNode', function () { currentSelectedNodeId = null; document.getElementById('description-panel').classList.remove('active'); });
        };

        // 🗑 ЛОГИКА ОТМЕНЫ УДАЛЕНИЯ (Корзина)
        window.deleteSelected = function() { 
            let selNodes = network.getSelectedNodes(); 
            let selEdges = network.getSelectedEdges(); 
            if (selNodes.length === 0 && selEdges.length === 0) return; 
            
            // Сохраняем в корзину перед удалением
            let delNodes = selNodes.map(id => nodes.get(id)); 
            let delEdges = selEdges.map(id => edges.get(id)); 
            selNodes.forEach(nId => { network.getConnectedEdges(nId).forEach(eId => { if(!selEdges.includes(eId)) delEdges.push(edges.get(eId)); }); }); 
            delEdges = [...new Map(delEdges.map(item => [item.id, item])).values()]; // Убираем дубликаты
            
            trash.push({ nodes: delNodes, edges: delEdges }); 
            document.getElementById('btn-undo').style.display = 'flex'; // Показываем кнопку "Отменить"
            
            network.deleteSelected(); 
            document.getElementById('description-panel').classList.remove('active'); 
        };

        // Возврат из корзины
        window.undoDelete = function() { 
            if (trash.length === 0) return; 
            let last = trash.pop(); 
            nodes.add(last.nodes); 
            edges.add(last.edges); 
            if (trash.length === 0) document.getElementById('btn-undo').style.display = 'none'; 
        };

        // 💾 РЕЗЕРВНОЕ КОПИРОВАНИЕ НА ПК (Если браузер очистится)
        window.exportData = function() { let dataStr = localStorage.getItem('taskManagerApp_Data') || JSON.stringify({nodes:nodes.get(), edges:edges.get()}); let a = document.createElement('a'); a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr); a.download = 'MyTasks_Backup.json'; a.click(); };
        window.importData = function(event) { let file = event.target.files[0]; if (!file) return; let reader = new FileReader(); reader.onload = function(e) { try { let data = JSON.parse(e.target.result); if (data.nodes && data.edges) { localStorage.setItem('taskManagerApp_Data', JSON.stringify(data)); location.reload(); } else alert("Неверный формат файла!"); } catch(err) { alert("Ошибка чтения файла!"); } }; reader.readAsText(file); };
        
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        window.fitCamera = function() { network.fit({ animation: { duration: 800, easingFunction: "easeInOutQuad" } }); };
        window.pickColor = function(el, color) { document.querySelectorAll('.color-dot').forEach(e => e.classList.remove('selected')); el.classList.add('selected'); selectedColor = color; };
        
        window.selectEmoji = function(emoji) { 
            document.getElementById('emoji-picker').style.display = 'none'; 
            tempNodeData.rawEmoji = emoji; 
            document.getElementById('text-modal-title').innerText = emoji + " Настройка"; 
            document.getElementById('custom-title').value = ''; 
            document.getElementById('custom-date').value = ''; 
            document.getElementById('custom-desc').value = ''; 
            document.getElementById('text-input-modal').style.display = 'block'; 
            document.getElementById('custom-title').focus(); 
        };
        
        // ✅ ОБЯЗАТЕЛЬНЫЕ ПОЛЯ ДЛЯ СОЗДАНИЯ
        window.saveCustomText = function() { 
            var title = document.getElementById('custom-title').value.trim(); 
            var dueDate = document.getElementById('custom-date').value.trim(); 
            var desc = document.getElementById('custom-desc').value.trim(); 
            
            if (!title || !dueDate || !desc) {
                alert("⚠️ Внимание: Поля Название, Срок и Описание ОБЯЗАТЕЛЬНЫ для заполнения!");
                return; // Останавливаем сохранение
            }

            document.getElementById('text-input-modal').style.display = 'none'; 
            
            tempNodeData.rawTitle = escapeHTML(title); 
            tempNodeData.dueDate = escapeHTML(dueDate);
            tempNodeData.description = escapeHTML(desc); 
            
            tempNodeData.isCompleted = false; 
            tempNodeData.shape = 'box'; 
            tempNodeData.color = selectedColor; 
            tempNodeData.font = { size: 20, color: selectedColor === '#ffd166' ? '#333' : '#fff' }; 
            
            tempCallback(tempNodeData); 
            network.setOptions({ physics: { enabled: true } }); 
            setTimeout(() => network.setOptions({ physics: { enabled: false } }), 1000); 
        };

        window.saveEdge = function(type) { 
            document.getElementById('edge-type-modal').style.display = 'none'; 
            tempEdgeData.type = type; 
            if (type === 'normal') { tempEdgeData.color = { color: '#9ca3af', highlight: '#3b82f6' }; tempEdgeData.width = 2; tempEdgeData.dashes = false; } 
            else if (type === 'urgent') { tempEdgeData.color = { color: '#ef476f', highlight: '#ef476f' }; tempEdgeData.width = 4; tempEdgeData.dashes = false; } 
            else if (type === 'idea') { tempEdgeData.color = { color: '#118ab2', highlight: '#118ab2' }; tempEdgeData.width = 2; tempEdgeData.dashes = true; } 
            
            tempEdgeCallback(tempEdgeData); 
            network.setOptions({ physics: { enabled: true } }); 
            setTimeout(() => network.setOptions({ physics: { enabled: false } }), 1000); 
        };
        
        window.cancelAction = function() { document.querySelectorAll('.modal').forEach(el => el.style.display = 'none'); if(tempCallback) tempCallback(null); if(tempEdgeCallback) tempEdgeCallback(null); };
        window.markCompleted = function() { if (!currentSelectedNodeId) return; var node = nodes.get(currentSelectedNodeId); nodes.update({ id: node.id, isCompleted: true, color: { background: '#dcfce7', border: '#22c55e' }, borderWidth: 3, font: { color: '#166534' } }); document.getElementById('btn-complete').style.display = 'none'; confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors:['#22c55e', '#118ab2', '#ffd166', '#ef476f'] }); };
        window.addNodeMode = function() { network.addNodeMode(); };
        window.addEdgeMode = function() { network.addEdgeMode(); };
    </script>
</body>
</html>
